<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masterpiece Photobooth</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/kiosk.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        body {
            font-family: 'Pretendard', sans-serif;
        }

        .btn-start {
            transition: all 0.2s ease;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .btn-start:active {
            transform: scale(0.98);
        }

        .feature-item {
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
        }

        .feature-item:nth-child(1) { animation-delay: 0.1s; }
        .feature-item:nth-child(2) { animation-delay: 0.2s; }
        .feature-item:nth-child(3) { animation-delay: 0.3s; }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <main class="kiosk-shell">
        <section class="kiosk-hero">
            <div class="brand-panel">
                <div>
                    <div class="kiosk-label">FREE PHOTO EXPERIENCE</div>
                    <h1 class="kiosk-title">Masterpiece</h1>
                    <p class="kiosk-subtitle">무료 셀프 포토부스</p>
                    <p class="kiosk-copy mt-5">
                        촬영, 사진 선택, 프레임 적용, QR 저장까지 한 번에 진행됩니다.
                    </p>
                </div>

                <div class="kiosk-stat-grid">
                    <div class="kiosk-stat">
                        <strong>6</strong>
                        <span>촬영 컷</span>
                    </div>
                    <div class="kiosk-stat">
                        <strong>4</strong>
                        <span>선택 컷</span>
                    </div>
                    <div class="kiosk-stat">
                        <strong>QR</strong>
                        <span>저장</span>
                    </div>
                </div>
            </div>

            <div class="action-panel">
                <button onclick="startSession(event)" class="btn-start kiosk-primary">
                    촬영 시작
                </button>

                <div class="kiosk-steps">
                    <div class="kiosk-step"><span>1</span>레이아웃 선택</div>
                    <div class="kiosk-step"><span>2</span>사진 촬영</div>
                    <div class="kiosk-step"><span>3</span>QR 다운로드</div>
                </div>

                <button onclick="goSettings()" class="kiosk-secondary">
                    설정
                </button>
            </div>
        </section>
    </main>

    <script>
        function startSession(event) {
            console.log('촬영 시작 버튼 클릭됨');

            // 버튼 클릭 효과
            if (event && event.target) {
                event.target.style.transform = 'scale(0.98)';
            }

            setTimeout(() => {
                if (event && event.target) {
                    event.target.style.transform = '';
                }
                // 프레임 레이아웃 선택 화면으로 이동
                console.log('프레임 선택 화면으로 이동: /app/frame-select');
                window.location.href = '/app/frame-select';
            }, 150);
        }

        function goSettings() {
            console.log('설정 화면으로 이동');
            window.location.href = '/app/settings';
        }

        // 페이지 로드 시 로그
        console.log('시작 화면 로드 완료');
    </script>
</body>
</html>
